# yaml-language-server: $schema=https://aka.ms/winget-manifest.installer.1.12.0.schema.json
PackageIdentifier: SpectrumIntegrators.Sercat
PackageVersion: 1.0.0
# sercat is a multi-file framework-dependent build, so it ships as a zip whose nested
# sercat.exe is registered as a portable command alias on PATH.
InstallerType: zip
NestedInstallerType: portable
NestedInstallerFiles:
  - RelativeFilePath: sercat.exe
    PortableCommandAlias: sercat
# sercat.exe is a framework-dependent .NET apphost: it loads sercat.dll from its own
# directory. A Links symlink would resolve next to the symlink (no sercat.dll there) and
# fail. ArchiveBinariesDependOnPath makes winget add the install dir to PATH instead, so
# the apphost runs in place beside its sercat.dll.
ArchiveBinariesDependOnPath: true
# Needs the .NET 8 base (console) runtime; winget installs it first if missing. The app
# also rolls forward to a newer major runtime (9/10/...) if that's all that's present.
Dependencies:
  PackageDependencies:
    - PackageIdentifier: Microsoft.DotNet.Runtime.8
Installers:
  - Architecture: x64
    InstallerUrl: https://github.com/jonathan-spectrumintegrators/sercat/releases/download/v1.0.0/sercat-1.0.0-win-x64.zip
    InstallerSha256: 6FA8BED17AC156594CFF2D518CE5F5C5646FE62161FF9D42A010E66F01CEFA29
ManifestType: installer
ManifestVersion: 1.12.0
